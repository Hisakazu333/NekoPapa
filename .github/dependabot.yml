version: 2
updates:
  - package-ecosystem: npm
    directory: /app/control-desktop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      desktop-npm:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /app/control-desktop/src-tauri
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      desktop-cargo:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    groups:
      workflow-actions:
        patterns:
          - "*"
